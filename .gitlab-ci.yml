stages:
  - build
  - publish
  - test
  - deploy

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/
    - .next/cache/
    - .m2/repository
    - target/

build_app:
  image: node:20-alpine
  stage: build
  script:
    - echo "Installing dependencies and building Next.js static export"
    - npm ci
    - npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - master
    - development

publish_stag:
  image: mwienk/docker-lftp
  stage: publish
  needs: ["build_app"]
  cache: []
  script:
    - echo "Copy out/ directory to staging server"
    - lftp -u $JS_STAGE_FTP_U,$JS_STAGE_FTP_PWD $JS_ADD -e "set ftp:ssl-allow no ; mirror -e -R -x .gitlab-ci.yml -x .git -x languages/ -x gallery/ -x blog/ -x test/ -x .m2/ -x links/ --parallel=5 ./out/ / ; quit"
    - echo "Copy complete"
  environment:
    name: staging
    url: http://staging.jonathansolis.com
  only:
    - master
    - development

generic_test:
  variables:
    MAVEN_OPTS: "-Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true"
    MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true"
  image: markhobson/maven-chrome:jdk-11
  stage: test
  script:
    - echo "Running UI staging tests with selenium in java"
    - cd test/Java-Selenium
    - mvn compile
    - mvn test -Dtest=com.jonathan.JonathanTests
  artifacts:
    when: always
    reports:
      junit:
        - test/Java-Selenium/target/surefire-reports/TEST-*.xml

deploy_prod:
  image: mwienk/docker-lftp
  stage: deploy
  needs: ["generic_test"]
  cache: []
  script:
    - echo "Deploy to production server"
    - lftp -u $JS_PROD_FTP_U,$JS_PROD_FTP_PWD $JS_ADD -e "set ftp:ssl-allow no ; mirror -e -R -x .gitlab-ci.yml -x .git -x languages/ -x gallery/ -x blog/ -x test/ -x .m2/ -x links/ --parallel=5 ./out/ / ; quit"
    - echo "Deployment to production complete"
  environment:
    name: production
    url: http://jonathansolis.com
  only:
    - master
